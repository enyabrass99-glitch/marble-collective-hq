def get_page_title(page_id):
    r = requests.get(f"https://api.notion.com/v1/pages/{page_id}", headers=HEADERS)
    data = r.json()
    try:
        for val in data.get("properties", {}).values():
            if val.get("type") == "title":
                return "".join(p["plain_text"] for p in val["title"])
    except:
        pass
    return "Untitled"

def get_blocks(page_id):
    blocks, cursor = [], None
    while True:
        url = f"https://api.notion.com/v1/blocks/{page_id}/children?page_size=100"
        if cursor:
            url += f"&start_cursor={cursor}"
        r = requests.get(url, headers=HEADERS)
        data = r.json()
        blocks.extend(data.get("results", []))
        if not data.get("has_more"):
            break
        cursor = data.get("next_cursor")
    return blocks

def rt(rich_text):
    html = ""
    for t in rich_text:
        text = t.get("plain_text", "").replace("&","&amp;").replace("<","&lt;").replace(">","&gt;")
        a = t.get("annotations", {})
        if a.get("bold"): text = f"<strong>{text}</strong>"
        if a.get("italic"): text = f"<em>{text}</em>"
        if a.get("code"): text = f"<code>{text}</code>"
        if a.get("strikethrough"): text = f"<s>{text}</s>"
        if t.get("href"): text = f'<a href="{t["href"]}" target="_blank">{text}</a>'
        html += text
    return html

def blocks_to_html(blocks):
    html = ""
    i = 0
    while i < len(blocks):
        b = blocks[i]
        bt = b["type"]
        if bt == "heading_1":
            html += f'<h1 class="nh1">{rt(b["heading_1"]["rich_text"])}</h1>\n'
        elif bt == "heading_2":
            html += f'<h2 class="nh2">{rt(b["heading_2"]["rich_text"])}</h2>\n'
        elif bt == "heading_3":
            html += f'<h3 class="nh3">{rt(b["heading_3"]["rich_text"])}</h3>\n'
        elif bt == "paragraph":
            text = rt(b["paragraph"]["rich_text"])
            html += f'<p class="np">{text}</p>\n' if text.strip() else '<div class="ngap"></div>\n'
        elif bt == "bulleted_list_item":
            items = []
            while i < len(blocks) and blocks[i]["type"] == "bulleted_list_item":
                items.append(f'<li>{rt(blocks[i]["bulleted_list_item"]["rich_text"])}</li>')
                i += 1
            html += f'<ul class="nul">{"".join(items)}</ul>\n'
            continue
        elif bt == "numbered_list_item":
            items = []
            while i < len(blocks) and blocks[i]["type"] == "numbered_list_item":
                items.append(f'<li>{rt(blocks[i]["numbered_list_item"]["rich_text"])}</li>')
                i += 1
            html += f'<ol class="nol">{"".join(items)}</ol>\n'
            continue
        elif bt == "to_do":
            checked = b["to_do"].get("checked", False)
            chk = "✅" if checked else "☐"
            html += f'<div class="ntodo">{chk} {rt(b["to_do"]["rich_text"])}</div>\n'
        elif bt == "quote":
            html += f'<blockquote class="nq">{rt(b["quote"]["rich_text"])}</blockquote>\n'
        elif bt == "callout":
            emoji = b["callout"].get("icon", {}).get("emoji", "💡")
            html += f'<div class="ncallout"><span class="nce">{emoji}</span><div>{rt(b["callout"]["rich_text"])}</div></div>\n'
        elif bt == "divider":
            html += '<hr class="ndiv">\n'
        elif bt == "table":
            rows_html = ""
            if b.get("has_children"):
                for j, row in enumerate(get_blocks(b["id"])):
                    if row["type"] == "table_row":
                        cells = row["table_row"]["cells"]
                        tag = "th" if j == 0 else "td"
                        rows_html += "<tr>" + "".join(f'<{tag}>{rt(c)}</{tag}>' for c in cells) + "</tr>"
            html += f'<div class="ntw"><table class="nt">{rows_html}</table></div>\n'
        elif bt == "toggle":
            inner = blocks_to_html(get_blocks(b["id"])) if b.get("has_children") else ""
            html += f'<details class="ntog"><summary>{rt(b["toggle"]["rich_text"])}</summary><div class="ntogc">{inner}</div></details>\n'
        elif bt == "image":
            img = b["image"]
            url = img.get("file", {}).get("url") or img.get("external", {}).get("url", "")
            cap = rt(img.get("caption", []))
            html += f'<figure class="nfig"><img src="{url}" alt="{cap}"><figcaption>{cap}</figcaption></figure>\n'
        elif bt == "column_list" and b.get("has_children"):
            cols = get_blocks(b["id"])
            html += '<div class="ncols">'
            for col in cols:
                if col["type"] == "column" and col.get("has_children"):
                    html += f'<div class="ncol">{blocks_to_html(get_blocks(col["id"]))}</div>'
            html += '</div>\n'
        i += 1
    return html

