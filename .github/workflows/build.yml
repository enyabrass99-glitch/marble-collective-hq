def build_page(key, title, content_html):
    sidebar_items = ""
    for icon, label, k in NAV:
        active = "active" if k == key else ""
        sidebar_items += f'<a href="{k}.html" class="sb-item {active}"><span class="sb-icon">{icon}</span><span class="sb-text">{label}</span></a>\n'

    return f"""<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title} — The Marble Collective</title>
{CSS}
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sb-brand">
    <div class="sb-eye">The Marble Collective</div>
    <div class="sb-name">Headquarters</div>
    <div class="sb-sub">Denver, CO · 2026</div>
  </div>
  <div class="sb-section">
    <div class="sb-label">Navigate</div>
    {sidebar_items}
  </div>
  <div class="sb-footer"><div class="sb-footer-text">Built from Notion<br>Updates automatically</div></div>
</nav>
<main class="main">
  <div class="page active">
    <div class="cover">
      <div class="cover-foot">
        <div class="cover-eye">The Marble Collective · {label}</div>
        <div class="cover-title">{title}</div>
      </div>
    </div>
    <div class="scroll"><div class="content">
      {content_html}
    </div></div>
  </div>
</main>
</div>
</body>
</html>"""

def main():
    dist = Path("dist")
    dist.mkdir(exist_ok=True)
    first = True
    for key, page_id in PAGES.items():
        print(f"Fetching {key}...")
        try:
            title = get_page_title(page_id)
            blocks = get_blocks(page_id)
            content = blocks_to_html(blocks)
            html = build_page(key, title, content)
            (dist / f"{key}.html").write_text(html, encoding="utf-8")
            if first:
                (dist / "index.html").write_text(html, encoding="utf-8")
                first = False
            print(f"  ✓ {title}")
        except Exception as e:
            print(f"  ✗ {key}: {e}")
    print("Done!")

if __name__ == "__main__":
    main()
